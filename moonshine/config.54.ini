[bilibili]
; ── 必填 ──────────────────────────────────────────────────────────────────────
; 你的 B 站 UID（主页 URL 中的数字，如 https://space.bilibili.com/123456）
uid = 123456

; 以下三项从浏览器 Cookie 中获取（登录后按 F12 → Application → Cookies → bilibili.com）
SESSDATA   = 你的SESSDATA
bili_jct   = 你的bili_jct
buvid3     = 你的buvid3

; ── 可选 ──────────────────────────────────────────────────────────────────────
; 如果你的账号开启了两步验证或需要刷新 Cookie，填入此项（从 ac.bilibili.com Cookie 取）
ac_time_value =
